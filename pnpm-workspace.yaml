packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  '@hono/node-server': ^1.13.7
  '@hono/trpc-server': ^0.3.4
  '@parcel/watcher': ^2.5.6
  '@phosphor-icons/react': ^2.1.10
  '@posthog/quill': 0.3.0-beta.19
  '@radix-ui/themes': ^3.2.1
  '@tanstack/devtools-vite': ^0.7.0
  '@tanstack/react-devtools': ^0.10.5
  '@tanstack/react-query': ^5.90.2
  '@tanstack/react-router': ^1.95.0
  '@tanstack/react-router-devtools': ^1.95.0
  '@tanstack/router-generator': ^1.95.0
  '@tanstack/router-plugin': ^1.95.0
  '@trpc/client': ^11.12.0
  '@trpc/server': ^11.12.0
  '@trpc/tanstack-react-query': 11.12.0
  '@types/node': ^20.0.0
  '@types/react': ^19.1.0
  '@types/react-dom': ^19.1.0
  hono: ^4.6.14
  inversify: ^7.10.6
  react: 19.1.0
  react-dom: 19.1.0
  reflect-metadata: ^0.2.2
  superjson: ^2.2.2
  tsup: ^8.5.1
  typescript: ^5.5.0

ignoredBuiltDependencies:
  - msw
  - protobufjs

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@agentclientprotocol/sdk'
  - '@anthropic-ai/claude-agent-sdk'
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl'
  - '@anthropic-ai/claude-agent-sdk-linux-x64'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64'
  - '@anthropic-ai/claude-agent-sdk-win32-x64'
  - '@anthropic-ai/sdk'
  - '@pierre/diffs'
  - '@pierre/theming'
  - '@posthog/quill'
  - '@posthog/quill-charts'
  - '@posthog/quill-tokens'
  - '@tanstack/devtools-core'
  - '@tanstack/devtools-vite'
  - '@tanstack/history'
  - '@tanstack/react-devtools'
  - '@tanstack/react-router'
  - '@tanstack/react-router-devtools'
  - '@tanstack/react-store'
  - '@tanstack/react-virtual'
  - '@tanstack/router-core'
  - '@tanstack/router-devtools-core'
  - '@tanstack/router-generator'
  - '@tanstack/router-plugin'
  - '@tanstack/router-utils'
  - '@tanstack/store'
  - '@tanstack/virtual-core'
  - '@tanstack/virtual-file-routes'

overrides:
  zod: 4.3.6
  # quill 0.3.0-beta.14 ships a broken `@base-ui/react: catalog:` dependency (the
  # catalog protocol leaked into the published package and can't resolve for an
  # external dep); pin it to a real version so installs of quill succeed.
  '@posthog/quill>@base-ui/react': ^1.3.0

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@posthog/cli'
  - better-sqlite3
  - core-js
  - electron
  - electron-winstaller
  - esbuild
  - fs-xattr
  - macos-alias
  - node-pty
  - tree-sitter-cli

patchedDependencies:
  node-pty: patches/node-pty.patch
