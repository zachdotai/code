name: Verify Agent Release

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - "packages/agent/**"
      - "packages/enricher/**"
      - "packages/git/**"
      - "packages/harness/**"
      - "packages/shared/**"
      - ".github/actions/build-agent-release/**"
      - ".github/workflows/agent-release.yml"
      - ".github/workflows/agent-release-verify.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  verify:
    name: Verify agent release build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test agent release
        uses: ./.github/actions/build-agent-release
